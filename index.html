<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eight28 Records | Label OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="desktop">
<canvas id="bg"></canvas>

<div class="desk-icons">
  <div class="di" data-win="win-explorer">
    <div class="di-img" style="background:linear-gradient(135deg,#c8a44a,#8c6010);">8</div>
    <div class="di-lbl">Label HQ</div>
  </div>
</div>

<div class="win open focused" id="win-explorer" style="width:920px;top:48px;left:80px;">
  <div class="wbar" id="exp-bar">
    <span class="wbar-ico" id="exp-ico">📁</span>
    <span class="wbar-ttl" id="exp-ttl">Eight28 Records</span>
    <div class="wbtns">
      <button class="wb" onclick="minWin('win-explorer')"><svg viewBox="0 0 10 10"><line x1="0" y1="9" x2="10" y2="9"/></svg></button>
      <button class="wb"><svg viewBox="0 0 10 10"><rect x=".5" y=".5" width="9" height="9" rx="1"/></svg></button>
      <button class="wb x" onclick="closeWin('win-explorer')"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
    </div>
  </div>
  <div class="exp-tb">
    <button class="exp-nav" id="btn-back" onclick="navBack()" disabled title="Back">
      <svg viewBox="0 0 16 16"><polyline points="10,3 5,8 10,13"/></svg>
    </button>
    <button class="exp-nav" id="btn-fwd" onclick="navFwd()" disabled title="Forward">
      <svg viewBox="0 0 16 16"><polyline points="6,3 11,8 6,13"/></svg>
    </button>
    <button class="exp-nav" onclick="navTo('home')" title="Home">
      <svg viewBox="0 0 16 16"><path d="M2 7L8 2l6 5v6a1 1 0 01-1 1H3a1 1 0 01-1-1z"/></svg>
    </button>
    <div class="exp-addr">
      <div class="exp-addr-crumb" id="exp-crumb"></div>
    </div>
    <div class="exp-search-box">
      <span>🔍</span>
      <input type="text" placeholder="Search..." id="exp-search" oninput="expSearch(this.value)">
    </div>
  </div>
  <div class="exp-body">
    <div class="exp-sb" id="exp-sb"></div>
    <div class="exp-pane" id="exp-pane"></div>
  </div>
</div>

<div id="backdrop" onclick="closeMobile()"></div>

<div id="story-ov" onclick="closeStoryOv(event)">
  <div id="story-win">
    <div id="story-handle" onclick="closeStory()"></div>
    <div id="story-bar">
      <span id="story-bar-ttl">Album Story</span>
      <button id="story-close" onclick="closeStory()">
        <svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
    <div id="story-body"></div>
  </div>
</div>

<div id="taskbar">
  <div class="tb-l">
    <button class="tb-start" id="smBtn" onclick="toggleStart()">
      <div class="wgrid"><div class="wsq"></div><div class="wsq"></div><div class="wsq"></div><div class="wsq"></div></div>
    </button>
  </div>
  <div class="tb-c">
    <button class="tb-btn cur" onclick="bringWin('win-explorer')">
      <span style="font-size:14px;font-weight:900;color:var(--gold);font-family:'Syne',sans-serif;">8</span>
    </button>
  </div>
  <div class="tb-r">
    <div class="tb-sys">🔊 📶 🔋</div>
    <div class="tb-clock">
      <div class="tb-time" id="tbTime">--:--</div>
      <div class="tb-date" id="tbDate">---</div>
    </div>
  </div>
</div>

<div id="smenu">
  <input class="sm-search" type="text" placeholder="Search artists, releases...">
  <div class="sm-lbl">Quick Access</div>
  <div class="sm-pins">
    <div class="sm-pin" onclick="navTo('home');toggleStart()">
      <div class="sm-pin-i" style="width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;font-weight:900;">8</div>
      <div class="sm-pin-l">Label HQ</div>
    </div>
    <div class="sm-pin" onclick="navTo('folder-artists');toggleStart()">
      <div class="sm-pin-i">📂</div><div class="sm-pin-l">Artists</div>
    </div>
    <div class="sm-pin" onclick="navTo('artist-lsd');toggleStart()">
      <div class="sm-pin-i">🎵</div><div class="sm-pin-l">LilSaintDenzel</div>
    </div>
    <div class="sm-pin" onclick="navTo('folder-releases');toggleStart()">
      <div class="sm-pin-i">💿</div><div class="sm-pin-l">Releases</div>
    </div>
    <div class="sm-pin" onclick="openStory('concordia');toggleStart()">
      <div class="sm-pin-i">📖</div><div class="sm-pin-l">Concordia</div>
    </div>
  </div>
  <div class="sm-foot">
    <div class="sm-user"><div class="sm-ava">L</div><div class="sm-uname">LilSaintDenzel</div></div>
    <div class="sm-pwr">⏻</div>
  </div>
</div>

<div id="ctxmenu">
  <div class="ctx-i" onclick="navTo('home');closeCtx()">🏠 Label HQ</div>
  <div class="ctx-i" onclick="navTo('folder-artists');closeCtx()">📂 Artists Folder</div>
  <div class="ctx-i" onclick="navTo('folder-releases');closeCtx()">💿 Releases Folder</div>
  <div class="ctx-s"></div>
  <div class="ctx-i" onclick="location.reload()">🔄 Refresh</div>
</div>

</div>
<script src="artists/lilsaintdenzel/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
