<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eight28 Records — Label OS v2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --accent:#0078d4;
  --gold:#c8a44a;
  --gold-bg:rgba(200,164,74,0.10);
  --gold-br:rgba(200,164,74,0.28);
  --glass:rgba(241,244,248,0.88);
  --glass-br:rgba(0,0,0,0.10);
  --winbody:rgba(247,249,251,0.97);
  --t1:#1a1a1a;
  --t2:#565656;
  --t3:#999;
  --div:rgba(0,0,0,0.07);
  --card:rgba(255,255,255,0.75);
  --hover:rgba(0,0,0,0.04);
  --sel:rgba(0,120,212,0.10);
  --sel-br:rgba(0,120,212,0.22);
  --tbh:50px;
  --sbw:200px;
}

html,body{width:100%;height:100%;overflow:hidden;font-family:'Syne',sans-serif;}

/* ── DESKTOP ── */
#desktop{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 110% 90% at 50% 40%,#0060c0 0%,#003d8a 55%,#001a5a 100%);
}
canvas#bg{position:absolute;inset:0;z-index:0;opacity:.5;}

/* ── DESKTOP ICONS ── */
.desk-icons{
  position:absolute;top:16px;left:16px;z-index:10;
  display:flex;flex-direction:column;gap:4px;
}
.di{
  width:76px;padding:10px 6px 8px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:background .14s;
}
.di:hover{background:rgba(255,255,255,0.15);}
.di.sel{background:rgba(255,255,255,0.22);outline:1px solid rgba(255,255,255,0.38);}
.di-img{
  width:46px;height:46px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,0.28);
}
.di-lbl{font-size:10px;color:#fff;text-align:center;line-height:1.25;font-weight:600;text-shadow:0 1px 5px rgba(0,0,0,.7);}

/* ── TASKBAR ── */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tbh);
  background:rgba(16,16,22,0.92);
  backdrop-filter:blur(48px) saturate(180%);
  border-top:1px solid rgba(255,255,255,0.07);
  z-index:2000;display:flex;align-items:center;
}
.tb-l{padding:0 10px;display:flex;align-items:center;}
.tb-c{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;}
.tb-r{padding:0 14px;display:flex;align-items:center;gap:10px;}
.tb-start{
  width:38px;height:38px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .14s;
}
.tb-start:hover,.tb-start.on{background:rgba(255,255,255,0.09);}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:2.5px;width:15px;height:15px;}
.wsq{background:#fff;border-radius:1px;}
.tb-btn{
  width:42px;height:42px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:background .14s;
}
.tb-btn:hover{background:rgba(255,255,255,0.08);}
.tb-btn.run::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:3px;border-radius:1.5px;background:rgba(255,255,255,0.35);}
.tb-btn.cur::after{background:var(--gold);width:14px;}
.tb-clock{text-align:right;cursor:default;}
.tb-time{font-family:'DM Mono',monospace;font-size:12px;color:#fff;line-height:1.2;}
.tb-date{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);}
.tb-sys{display:flex;gap:6px;align-items:center;font-size:12px;opacity:.6;cursor:default;}

/* ── WINDOW BASE ── */
.win{
  position:absolute;
  background:var(--glass);
  backdrop-filter:blur(60px) saturate(200%);
  border:1px solid var(--glass-br);
  border-radius:10px;
  box-shadow:0 12px 48px rgba(0,0,0,0.24),inset 0 0 0 1px rgba(255,255,255,0.55);
  display:none;flex-direction:column;overflow:hidden;
  min-width:300px;
  max-height:calc(100vh - var(--tbh) - 20px);
  z-index:100;
}
.win.open{display:flex;animation:popIn .22s cubic-bezier(.2,0,0,1);}
.win.focused{z-index:200;box-shadow:0 20px 64px rgba(0,0,0,0.30),inset 0 0 0 1px rgba(255,255,255,0.6);}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* Win title bar */
.wbar{
  height:36px;display:flex;align-items:center;
  padding:0 0 0 14px;cursor:move;flex-shrink:0;
  background:rgba(255,255,255,0.42);
  border-bottom:1px solid rgba(0,0,0,0.06);
  position:relative;
}
.wbar-ico{font-size:14px;margin-right:8px;}
.wbar-ttl{font-size:12px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wbtns{display:flex;}
.wb{width:46px;height:36px;border:none;background:transparent;cursor:pointer;color:var(--t1);display:flex;align-items:center;justify-content:center;transition:background .1s;}
.wb:hover{background:rgba(0,0,0,0.07);}
.wb.x:hover{background:#c42b1c;color:#fff;}
.wb svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;}

/* ══════════════════════════════════════
   EXPLORER WINDOW
══════════════════════════════════════ */
#win-explorer{width:900px;top:50px;left:80px;}

/* Explorer toolbar */
.exp-tb{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  background:rgba(255,255,255,0.38);
  border-bottom:1px solid var(--div);
  flex-shrink:0;
}
.exp-nav{
  width:28px;height:28px;border-radius:5px;border:none;
  background:transparent;cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.exp-nav:hover{background:rgba(0,0,0,0.07);}
.exp-nav:disabled{opacity:.3;cursor:default;}
.exp-nav svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.exp-addr{
  flex:1;height:28px;
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(0,0,0,0.1);border-radius:5px;
  display:flex;align-items:center;padding:0 10px;gap:4px;
  font-size:12px;color:var(--t2);overflow:hidden;
}
.exp-addr-crumb{display:flex;align-items:center;gap:3px;white-space:nowrap;}
.exp-crumb-part{
  font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;
  padding:2px 4px;border-radius:3px;transition:background .12s;
}
.exp-crumb-part:hover{background:rgba(0,0,0,0.07);}
.exp-crumb-sep{font-size:10px;color:var(--t3);}

.exp-search-box{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.8);border:1px solid rgba(0,0,0,0.1);
  border-radius:5px;padding:0 10px;height:28px;width:160px;
}
.exp-search-box span{font-size:11px;color:var(--t3);}
.exp-search-box input{
  border:none;background:transparent;outline:none;
  font-size:11px;font-family:'Syne',sans-serif;color:var(--t1);width:100%;
}
.exp-search-box input::placeholder{color:var(--t3);}

/* Explorer body = sidebar + pane */
.exp-body{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.exp-sb{
  width:var(--sbw);flex-shrink:0;
  background:rgba(255,255,255,0.28);
  border-right:1px solid var(--div);
  overflow-y:auto;padding:8px 0;
}
.exp-sb::-webkit-scrollbar{width:3px;}
.exp-sb::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px;}

.sb-group{
  padding:10px 14px 4px;
  font-family:'DM Mono',monospace;font-size:9px;font-weight:500;
  color:var(--t3);letter-spacing:.1em;text-transform:uppercase;
}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;font-size:12px;font-weight:600;
  color:var(--t2);cursor:pointer;
  border-radius:0;transition:background .12s;
  border-left:2px solid transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sb-item span{font-size:14px;flex-shrink:0;}
.sb-item:hover{background:rgba(0,0,0,0.04);}
.sb-item.active{
  background:var(--sel);color:var(--accent);
  border-left-color:var(--accent);
}

/* Main pane */
.exp-pane{
  flex:1;overflow-y:auto;
  background:var(--winbody);
}
.exp-pane::-webkit-scrollbar{width:3px;}
.exp-pane::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px;}

/* ── VIEW: HOME ── */
.view-home{}
.home-banner{
  padding:28px 28px 22px;
  background:linear-gradient(135deg,rgba(0,120,212,0.07) 0%,transparent 55%);
  border-bottom:1px solid var(--div);
}
.home-logo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.home-logo{
  width:52px;height:52px;border-radius:12px;
  background:var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;color:#000;
  box-shadow:0 6px 18px rgba(200,164,74,0.36);
}
.home-name{font-size:19px;font-weight:800;color:var(--t1);line-height:1.1;}
.home-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);margin-top:2px;letter-spacing:.04em;}
.home-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(22px,3.5vw,36px);font-weight:400;font-style:italic;
  line-height:1.05;color:var(--t1);margin-bottom:8px;
}
.home-title strong{font-style:normal;color:var(--accent);}
.home-desc{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);line-height:1.75;max-width:500px;margin-bottom:14px;}
.home-pills{display:flex;gap:6px;flex-wrap:wrap;}
.hpill{border:1px solid var(--div);border-radius:4px;padding:3px 10px;font-size:10px;font-family:'DM Mono',monospace;color:var(--t2);background:rgba(0,0,0,0.03);}
.hpill.g{border-color:var(--gold-br);color:#7a5c18;background:var(--gold-bg);}

.home-stats{display:flex;border-top:1px solid var(--div);background:rgba(0,0,0,0.015);}
.hstat{flex:1;padding:12px 16px;border-right:1px solid var(--div);}
.hstat:last-child{border-right:none;}
.hstat-n{font-family:'Instrument Serif',serif;font-size:26px;color:var(--accent);line-height:1;}
.hstat-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* Folder grid */
.folder-section{padding:18px 20px 8px;}
.folder-section-lbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px;}

.folder-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px 10px;border-radius:8px;
  cursor:pointer;transition:background .13s;
  border:1px solid transparent;
}
.folder-item:hover{background:var(--sel);border-color:var(--sel-br);}
.folder-item.sel{background:var(--sel);border-color:var(--sel-br);}
.fi-ico{
  width:52px;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;
}
/* Folder icon shape */
.fi-ico.folder::before{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:32px;border-radius:2px 6px 6px 6px;
}
.fi-ico.folder::after{
  content:'';
  position:absolute;
  top:8px;left:0;
  width:48%;height:10px;
  border-radius:4px 4px 0 0;
}
.fi-folder-art{
  position:relative;width:52px;height:44px;
  display:flex;align-items:flex-end;justify-content:center;
}
.fi-folder-back{
  position:absolute;bottom:0;left:0;right:0;height:32px;
  border-radius:2px 6px 6px 6px;
}
.fi-folder-tab{
  position:absolute;top:7px;left:0;
  width:50%;height:10px;
  border-radius:4px 4px 0 0;
}
.fi-folder-inner{
  position:absolute;bottom:4px;
  width:38px;height:20px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.fi-name{font-size:11px;font-weight:700;color:var(--t1);text-align:center;line-height:1.25;}
.fi-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-align:center;}

/* ── VIEW: FOLDER (Artists / Releases sub-folder) ── */
.view-folder{}
.folder-header{
  display:flex;align-items:center;gap:14px;
  padding:20px 22px;border-bottom:1px solid var(--div);
  background:linear-gradient(135deg,rgba(0,0,0,0.02),transparent);
}
.fh-ico{font-size:36px;}
.fh-name{font-size:18px;font-weight:800;color:var(--t1);}
.fh-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px;}
.folder-contents{padding:16px 20px;}

/* ── VIEW: ARTIST ── */
.artist-view{}
.av-hero{
  height:190px;position:relative;
  display:flex;align-items:flex-end;overflow:hidden;
}
.av-hero-bg{position:absolute;inset:0;}
.av-hero-glow{position:absolute;inset:0;}
.av-hero-info{
  position:relative;z-index:2;
  padding:0 22px 18px;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 100%);
  width:100%;
}
.av-badge{
  display:inline-block;background:rgba(200,164,74,0.18);
  border:1px solid var(--gold-br);color:var(--gold);
  font-family:'DM Mono',monospace;font-size:9px;
  padding:2px 9px;border-radius:3px;letter-spacing:.08em;margin-bottom:7px;
}
.av-name{font-size:22px;font-weight:800;color:#fff;line-height:1;}
.av-role{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;}

/* Stats strip */
.av-stats{display:flex;border-bottom:1px solid var(--div);}
.avs{flex:1;padding:11px 14px;border-right:1px solid var(--div);text-align:center;}
.avs:last-child{border-right:none;}
.avs-n{font-family:'Instrument Serif',serif;font-size:20px;color:var(--accent);line-height:1;}
.avs-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* Tabs */
.av-tabs{display:flex;border-bottom:1px solid var(--div);background:rgba(255,255,255,0.35);flex-shrink:0;overflow-x:auto;}
.av-tab{
  padding:10px 16px;font-size:12px;font-weight:700;color:var(--t2);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color .14s,border-color .14s;white-space:nowrap;
}
.av-tab:hover{color:var(--t1);}
.av-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.av-panel{display:none;}
.av-panel.on{display:block;}

/* Bio */
.av-bio{padding:20px 22px;}
.av-bio-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);line-height:1.82;margin-bottom:14px;}
.av-details{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.av-detail{
  display:flex;align-items:center;gap:7px;
  background:var(--card);border:1px solid var(--div);border-radius:6px;padding:7px 11px;
}
.avd-ico{font-size:13px;}
.avd-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);}

/* Discography */
.av-disc{}
.disc-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;border-bottom:1px solid var(--div);
  cursor:pointer;transition:background .12s;
}
.disc-row:hover{background:var(--hover);}
.disc-row:last-child{border-bottom:none;}
.dr-cover{
  width:46px;height:46px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.dr-info{flex:1;min-width:0;}
.dr-title{font-size:13px;font-weight:700;color:var(--t1);}
.dr-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-top:1px;}
.dr-tracks{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);margin-top:2px;}
.dr-badge{
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  flex-shrink:0;
}
.dr-type{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);border:1px solid rgba(0,120,212,0.2);border-radius:3px;padding:2px 7px;background:rgba(0,120,212,0.06);}
.dr-story{font-size:8px;color:var(--accent);border:1px solid rgba(0,120,212,0.2);border-radius:3px;padding:1px 6px;background:rgba(0,120,212,0.06);}

/* Tracks */
.av-tracks{}
.tr{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;border-bottom:1px solid var(--div);
  cursor:pointer;transition:background .12s,padding-left .12s;
}
.tr:hover{background:var(--hover);padding-left:24px;}
.tr:last-child{border-bottom:none;}
.tr-n{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);width:18px;text-align:right;flex-shrink:0;}
.tr:hover .tr-n{color:var(--accent);}
.tr-play{width:17px;height:17px;border-radius:50%;background:rgba(0,120,212,0.09);border:1px solid rgba(0,120,212,0.22);display:flex;align-items:center;justify-content:center;font-size:5px;color:var(--accent);opacity:0;transition:opacity .13s;}
.tr:hover .tr-play{opacity:1;}
.tr-name{flex:1;font-size:12px;font-weight:600;color:var(--t1);}
.tr-album{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}
.tr-dur{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}

/* Links */
.av-links{padding:14px 16px;display:flex;flex-direction:column;gap:7px;}
.lnk{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--div);border-radius:8px;
  padding:11px 13px;cursor:pointer;transition:background .12s,border-color .12s;
}
.lnk:hover{background:var(--sel);border-color:var(--sel-br);}
.lnk-ico{width:32px;height:32px;border-radius:7px;background:rgba(0,120,212,0.09);border:1px solid rgba(0,120,212,0.14);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.lnk-t{flex:1;}
.lnk-name{font-size:13px;font-weight:700;color:var(--t1);}
.lnk-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
.lnk-arr{font-size:13px;color:var(--t3);transition:color .12s,transform .12s;}
.lnk:hover .lnk-arr{color:var(--accent);transform:translateX(2px);}

/* ── START MENU ── */
#smenu{
  position:fixed;
  bottom:calc(var(--tbh)+8px);left:50%;transform:translateX(-50%);
  width:580px;max-width:calc(100vw - 24px);
  background:rgba(236,240,246,0.95);
  backdrop-filter:blur(60px) saturate(200%);
  border:1px solid rgba(0,0,0,0.09);border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.22);
  padding:20px 18px 16px;z-index:1900;display:none;
}
#smenu.on{display:block;animation:popIn .18s cubic-bezier(.2,0,0,1);}
.sm-search{
  width:100%;padding:8px 13px;
  background:rgba(255,255,255,0.92);border:1px solid rgba(0,0,0,0.1);border-radius:6px;
  font-size:13px;font-family:'Syne',sans-serif;color:var(--t1);
  outline:none;margin-bottom:16px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  transition:border-color .14s,box-shadow .14s;
}
.sm-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,120,212,0.18);}
.sm-search::placeholder{color:var(--t3);}
.sm-lbl{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;}
.sm-pins{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:14px;}
.sm-pin{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 4px 7px;border-radius:7px;cursor:pointer;transition:background .13s;}

.sm-uname{font-size:13px;font-weight:700;color:var(--t1);}
.sm-pwr{width:28px;height:28px;border-radius:6px;border:1px solid var(--div);background:rgba(0,0,0,0.03);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:background .13s;}

#ctxmenu{

  border-radius:8px;padding:5px;min-width:180px;
  box-shadow:0 8px 28px rgba(0,0,0,0.18);z-index:3000;display:none;
}
#ctxmenu.on{display:block;animation:popIn .12s ease;}
.ctx-i{padding:7px 12px;border-radius:4px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--t1);transition:background .1s;}
.ctx-i:hover{background:var(--hover);}
.ctx-s{height:1px;background:var(--div);margin:3px 0;}

/* ── BACKDROP (mobile) ── */
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,30,0.45);backdrop-filter:blur(3px);z-index:290;}
#backdrop.on{display:block;}

/* ── STORY OVERLAY ── */
#story-ov{
  position:fixed;inset:0;z-index:3500;
  background:rgba(0,10,30,0.70);
  backdrop-filter:blur(12px) saturate(160%);
  display:none;align-items:center;justify-content:center;padding:20px;
}
#story-ov.on{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#story-win{
  background:rgba(244,246,250,0.98);
  backdrop-filter:blur(60px);
  border:1px solid rgba(0,0,0,0.10);
  border-radius:14px;
  box-shadow:0 32px 80px rgba(0,0,0,0.38);
  width:100%;max-width:680px;max-height:88vh;
  display:flex;flex-direction:column;overflow:hidden;
  animation:popIn .24s cubic-bezier(.2,0,0,1);
}
#story-bar{display:flex;align-items:center;padding:0 14px;height:38px;flex-shrink:0;background:rgba(255,255,255,0.5);border-bottom:1px solid rgba(0,0,0,0.06);}
#story-bar-ttl{flex:1;font-size:12px;font-weight:600;color:var(--t1);}
#story-close{width:46px;height:38px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t1);border-radius:0 14px 0 0;transition:background .1s;}
#story-close:hover{background:#c42b1c;color:#fff;}
#story-close svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;}
#story-body{overflow-y:auto;flex:1;}
#story-body::-webkit-scrollbar{width:3px;}
#story-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.14);border-radius:2px;}

.sh-hero{min-height:210px;position:relative;display:flex;align-items:flex-end;overflow:hidden;}
.sh-bg{position:absolute;inset:0;}
.sh-glow{position:absolute;inset:0;}

.st-list{display:flex;flex-direction:column;}

// ═══════════════════════════════════════
//  EXPLORER NAVIGATION
// ═══════════════════════════════════════
let history = [], histIdx = -1, currentView = '';

function navTo(view, pushHistory=true) {
  if (pushHistory) {
    if (histIdx < history.length - 1) history = history.slice(0, histIdx+1);
    history.push(view); histIdx++;
  }
  currentView = view;
  renderView(view);
  updateNav();
  bringWin('win-explorer');
}

function navBack() { if(histIdx>0){ histIdx--; navTo(history[histIdx],false); } }
function navFwd()  { if(histIdx<history.length-1){ histIdx++; navTo(history[histIdx],false); } }

function updateNav() {
  document.getElementById('btn-back').disabled = histIdx<=0;
  document.getElementById('btn-fwd').disabled  = histIdx>=history.length-1;
}

function renderView(view) {
  const pane = document.getElementById('exp-pane');
  const sb   = document.getElementById('exp-sb');

  // Update sidebar active
  sb.querySelectorAll('.sb-item').forEach(i => i.classList.toggle('active', i.dataset.view===view));

  if (view === 'home')               { pane.innerHTML = viewHome();            setTitle('Eight28 Records','📁'); }
  else if (view === 'folder-artists'){ pane.innerHTML = viewFolderArtists();   setTitle('Artists','📂'); }
  else if (view === 'folder-releases'){pane.innerHTML = viewFolderReleases();  setTitle('Releases','💿'); }
  else if (view.startsWith('artist-')){ pane.innerHTML = viewArtist(view.replace('artist-','')); setTitle(ARTISTS[view.replace('artist-','')]?.name||'','🎵'); initArtistTabs(); }
  else if (view.startsWith('release-')){ pane.innerHTML = viewRelease(view.replace('release-','')); setTitle(RELEASES[view.replace('release-','')]?.name||'','💿'); }

  renderCrumb(view);
  renderSidebar();
  pane.scrollTop = 0;
}

function setTitle(t, ico) {
  document.getElementById('exp-ttl').textContent = t;
  document.getElementById('exp-ico').textContent = ico;
}

function renderCrumb(view) {
  const parts = [];
  parts.push({label:'Eight28 Records', view:'home'});
  if (view==='folder-artists') parts.push({label:'Artists',view:'folder-artists'});
  else if (view==='folder-releases') parts.push({label:'Releases',view:'folder-releases'});
  else if (view.startsWith('artist-')) {
    parts.push({label:'Artists',view:'folder-artists'});
    const a = ARTISTS[view.replace('artist-','')];
    if(a) parts.push({label:a.name, view});
  } else if (view.startsWith('release-')) {
    const r = RELEASES[view.replace('release-','')];
    if(r){
      parts.push({label:'Artists',view:'folder-artists'});
      const a = ARTISTS[r.artistId];
      if(a) parts.push({label:a.name, view:'artist-'+r.artistId});
      parts.push({label:r.name, view});
    }
  }
  const el = document.getElementById('exp-crumb');
  el.innerHTML = parts.map((p,i) =>
    `<span class="exp-crumb-part" onclick="navTo('${p.view}')">${p.label}</span>${i<parts.length-1?'<span class="exp-crumb-sep">›</span>':''}`
  ).join('');
}

function viewArtist(id) {

    const r = RELEASES[rid]; if(!r) return '';

      <div class="dr-cover" style="background:${r.coverBg};">${r.icon}</div>
      <div class="dr-info">
        <div class="dr-title">${r.name}</div>
        <div class="dr-meta">${r.meta}</div>
        <div class="dr-tracks">${r.tracks.map(t=>t.n).join(' · ')}</div>
      </div>
      <div class="dr-badge">
        <span class="dr-type">${r.type}</span>
        <span class="dr-story" onclick="event.stopPropagation();openStory('${rid}')">📖 Story</span>
      </div>
    </div>`;
  }).join('');

  const seriesHTML = (a.series||[]).map(s=>`
    <div class="disc-row">
      <div class="dr-cover" style="background:linear-gradient(135deg,#0a0818,#14102a);font-size:18px;">${s.ico}</div>
      <div class="dr-info"><div class="dr-title">${s.name}</div><div class="dr-meta">${s.meta}</div></div>
      <div class="dr-badge"><span class="dr-type">${s.type}</span></div>
    </div>`).join('');

  const allTracks = a.releases.flatMap(rid=>(RELEASES[rid]?.tracks||[]).map((t,i)=>({...t,num:i+1})));
  const tracksHTML = allTracks.map(t=>`
    <div class="tr">
      <span class="tr-n">${String(t.num).padStart(2,'0')}</span>
      <div class="tr-play">▶</div>
      <span class="tr-name">${t.n}</span>
      <span class="tr-album">${t.album}</span>
      <span class="tr-dur">${t.dur}</span>
    </div>`).join('');

  const linksHTML = a.links.map(l=>`
    <a class="lnk" href="https://${l.u.replace(/^@/,'instagram.com/')}" target="_blank" rel="noopener" style="text-decoration:none;">
      <div class="lnk-ico">${l.i}</div>
      <div class="lnk-t"><div class="lnk-name">${l.n}</div><div class="lnk-url">${l.u}</div></div>

  const statsHTML = a.stats.map(s=>`<div class="avs"><div class="avs-n">${s.n}</div><div class="avs-l">${s.l}</div></div>`).join('');

  const discTab = a.releases.length > 0
    ? `<div class="av-tab" data-panel="${id}-disc" onclick="switchArtistTab(this,'${id}','disc')">Discography</div>`
    : (a.series ? `<div class="av-tab" data-panel="${id}-disc" onclick="switchArtistTab(this,'${id}','disc')">Series</div>` : '');

  const tracksTab = allTracks.length > 0
    ? `<div class="av-tab" data-panel="${id}-tracks" onclick="switchArtistTab(this,'${id}','tracks')">All Tracks</div>` : '';

  return `<div class="artist-view">
  <div class="av-hero">
    <div class="av-hero-bg" style="background:${a.heroBg};"></div>
    <div class="av-hero-glow" style="background:${a.heroGlow};"></div>

      <div class="av-badge">${a.badge}</div>
      <div class="av-name">${a.name}</div>
      <div class="av-role">${a.role}</div>
    </div>

  <div class="av-tabs" id="tabs-${id}">

  </div>
  <div class="av-panel" id="${id}-disc">
    <div class="${a.releases.length>0?'av-disc':'av-disc'}">${discHTML}${seriesHTML}</div>
  </div>
  ${allTracks.length>0?`<div class="av-panel" id="${id}-tracks"><div class="av-tracks">${tracksHTML}</div></div>`:''}

// ── Artist tab switching ──
function switchArtistTab(btn, artistId, panel) {
  const tabsEl = document.getElementById('tabs-'+artistId);
  if(!tabsEl) return;
  tabsEl.querySelectorAll('.av-tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const pane = document.getElementById('exp-pane');
  pane.querySelectorAll('.av-panel').forEach(p=>p.classList.remove('on'));
  const target = document.getElementById(artistId+'-'+panel);
  if(target) target.classList.add('on');
}

// ── Search ──
function expSearch(q) {
  if(!q.trim()) return;
  q = q.toLowerCase();
  // Just navigate to matching artist or release
  if('lilsaintdenzel'.includes(q)||'lsd'.includes(q)) navTo('artist-lsd');
  else if('concordia'.includes(q)) navTo('release-concordia');
  else if('good friday'.includes(q)||'goodfriday'.includes(q)) navTo('release-goodfriday');
  else if('est 1995'.includes(q)||'est1995'.includes(q)) navTo('release-est1995');
  else if('heartware'.includes(q)) navTo('release-heartware');
  else if('dark clouds'.includes(q)||'darkclouds'.includes(q)) navTo('release-darkclouds');
  else if('imago dei'.includes(q)||'imagodei'.includes(q)) navTo('release-imagodei');
  else if('euangelion'.includes(q)) navTo('release-euangelion');
  else if('pantasynergy'.includes(q)||'panta synergy'.includes(q)) navTo('release-pantasynergy');
  else if('the return'.includes(q)||'thereturn'.includes(q)) navTo('release-thereturn');
  else if('solas'.includes(q)) navTo('release-solas');
  else if('rescued'.includes(q)||'the hundred'.includes(q)) navTo('release-rescued');
}

// ═══════════════════════════════════════
//  WINDOW MANAGEMENT
// ═══════════════════════════════════════
let zTop=200;
const mob=()=>window.innerWidth<=768;

function focusWin(el){ document.querySelectorAll('.win').forEach(w=>w.classList.remove('focused')); el.classList.add('focused'); el.style.zIndex=++zTop; }

function openWin(id){
  const w=document.getElementById(id);
  if(mob()){ document.querySelectorAll('.win.open').forEach(o=>{if(o.id!==id){o.classList.remove('open');}}); w.style.display='flex'; requestAnimationFrame(()=>w.classList.add('open')); document.getElementById('backdrop').classList.add('on'); }
  else{ w.style.display='flex'; w.classList.add('open'); }
  focusWin(w);
}

function bringWin(id){
  const w=document.getElementById(id);
  if(!w.classList.contains('open')||w.style.display==='none') openWin(id);
  else focusWin(w);
}

function closeWin(id){
  const w=document.getElementById(id);
  if(mob()){ w.classList.remove('open'); setTimeout(()=>{if(!w.classList.contains('open'))w.style.display='none';},300); if(!document.querySelector('.win.open'))document.getElementById('backdrop').classList.remove('on'); }
  else{ w.classList.remove('open'); w.style.opacity='0'; w.style.transform='scale(0.95)'; setTimeout(()=>{w.style.display='none';w.style.opacity='';w.style.transform='';},180); }
}

function minWin(id){
  if(mob()){closeWin(id);return;}
  const w=document.getElementById(id); w.classList.remove('open'); w.style.display='none';
}

function closeMobile(){ document.querySelectorAll('.win.open').forEach(w=>{w.classList.remove('open');setTimeout(()=>{w.style.display='none';},300);}); document.getElementById('backdrop').classList.remove('on'); }

// Drag
let dragEl=null,ox=0,oy=0;
document.querySelectorAll('.wbar').forEach(bar=>{
  bar.addEventListener('mousedown',e=>{
    if(mob()||e.target.closest('.wbtns')) return;
    dragEl=bar.closest('.win'); const r=dragEl.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top; focusWin(dragEl); e.preventDefault();
  });
});
document.addEventListener('mousemove',e=>{ if(!dragEl) return; let x=Math.max(0,Math.min(window.innerWidth-dragEl.offsetWidth,e.clientX-ox)); let y=Math.max(0,Math.min(window.innerHeight-50-dragEl.offsetHeight,e.clientY-oy)); dragEl.style.left=x+'px'; dragEl.style.top=y+'px'; });
document.addEventListener('mouseup',()=>dragEl=null);

// Swipe to close (mobile)
document.querySelectorAll('.wbar').forEach(bar=>{
  let sy=0,act=false;
  bar.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;act=true;},{passive:true});
  bar.addEventListener('touchmove',e=>{ if(!act) return; const dy=e.touches[0].clientY-sy; if(dy>0) bar.closest('.win').style.transform=`translateY(${dy}px)`; },{passive:true});
  bar.addEventListener('touchend',e=>{ if(!act) return; act=false; const w=bar.closest('.win'); const dy=e.changedTouches[0].clientY-sy; w.style.transform=''; if(dy>70) closeWin(w.id); },{passive:true});
});

// Desktop icons
document.querySelectorAll('.di').forEach(icon=>{
  icon.addEventListener('click',e=>{ const wid=icon.dataset.win; if(!wid) return; if(mob()){bringWin(wid);}else{if(icon.classList.contains('sel')){bringWin(wid);icon.classList.remove('sel');}else{document.querySelectorAll('.di').forEach(i=>i.classList.remove('sel'));icon.classList.add('sel');}} e.stopPropagation(); });
  icon.addEventListener('dblclick',e=>{ if(!mob()) bringWin(icon.dataset.win); });
});
document.getElementById('desktop').addEventListener('click',()=>document.querySelectorAll('.di').forEach(i=>i.classList.remove('sel')));

// Start menu
function toggleStart(){ const sm=document.getElementById('smenu'),btn=document.getElementById('smBtn'); sm.classList.toggle('on'); btn.classList.toggle('on'); }
document.addEventListener('click',e=>{ const sm=document.getElementById('smenu'),btn=document.getElementById('smBtn'); if(!sm.contains(e.target)&&!btn.contains(e.target)){sm.classList.remove('on');btn.classList.remove('on');} });

// Context menu
const ctxEl=document.getElementById('ctxmenu');
document.getElementById('desktop').addEventListener('contextmenu',e=>{ if(mob()||e.target.closest('.win')||e.target.closest('#taskbar')) return; e.preventDefault(); ctxEl.style.left=Math.min(e.clientX,window.innerWidth-200)+'px'; ctxEl.style.top=Math.min(e.clientY,window.innerHeight-130)+'px'; ctxEl.classList.add('on'); });
document.addEventListener('click',()=>closeCtx());
function closeCtx(){ ctxEl.classList.remove('on'); }

// Clock
function tick(){ const d=new Date(); const h=String(d.getHours()).padStart(2,'0'); const m=String(d.getMinutes()).padStart(2,'0'); const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; document.getElementById('tbTime').textContent=`${h}:${m}`; document.getElementById('tbDate').textContent=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`; }
tick(); setInterval(tick,1000);

// Wallpaper canvas
const cvs=document.getElementById('bg'); const cx=cvs.getContext('2d');
function rsz(){ cvs.width=window.innerWidth; cvs.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);
let t=0;
const waves=[{amp:90,freq:.0018,spd:.0025,a:.05,col:'rgba(80,160,255,'},{amp:60,freq:.0028,spd:.004,a:.04,col:'rgba(140,200,255,'},{amp:110,freq:.0012,spd:.002,a:.035,col:'rgba(50,120,220,'},{amp:50,freq:.004,spd:.006,a:.03,col:'rgba(180,220,255,'}];
function draw(){ cx.clearRect(0,0,cvs.width,cvs.height); t+=.5; waves.forEach((w,i)=>{ cx.beginPath(); for(let x=0;x<=cvs.width;x+=3){ const y=cvs.height*.5+Math.sin(x*w.freq+t*w.spd+i*1.2)*w.amp+Math.sin(x*w.freq*.6+t*w.spd*.8)*w.amp*.35; x===0?cx.moveTo(x,y):cx.lineTo(x,y); } cx.strokeStyle=w.col+w.a+')'; cx.lineWidth=1.5; cx.stroke(); }); requestAnimationFrame(draw); }
draw();

// ── INIT ──
navTo('home');
if(mob()) setTimeout(()=>bringWin('win-explorer'),300);
</script>
